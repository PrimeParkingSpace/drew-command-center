<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦊 Drew Command Center - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: #0a0a1a; 
            color: #e0e0e0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        .login-form { 
            background: #12122a; 
            padding: 2rem; 
            border-radius: 12px; 
            border: 1px solid #1e2040;
            min-width: 300px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .login-form h2 { 
            text-align: center; 
            margin-bottom: 1.5rem; 
            color: #6c5ce7; 
            font-size: 1.8rem;
        }
        .form-group { 
            margin-bottom: 1rem; 
        }
        .form-group label { 
            display: block; 
            margin-bottom: 0.5rem; 
            color: #8b8fa3; 
            font-weight: 500;
        }
        .form-group input { 
            width: 100%; 
            padding: 0.75rem; 
            border: 1px solid #1e2040; 
            border-radius: 8px; 
            background: #0a0a1a; 
            color: #e0e0e0; 
            box-sizing: border-box;
            font-size: 1rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: #6c5ce7;
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.1);
        }
        .btn { 
            width: 100%; 
            padding: 0.75rem; 
            border: none; 
            border-radius: 8px; 
            background: #6c5ce7; 
            color: white; 
            cursor: pointer; 
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .btn:hover { 
            background: #5a4fcf; 
            transform: translateY(-1px);
        }
        .version {
            text-align: center;
            margin-top: 1rem;
            color: #8b8fa3;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="login-form">
        <h2>🦊 Drew Command Center</h2>
        <form method="POST">
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn">Access Command Center</button>
        </form>
        <div class="version">Production v2.0 • AWS Enterprise</div>
    </div>
</body>
</html>
